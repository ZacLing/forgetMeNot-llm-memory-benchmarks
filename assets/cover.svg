      <stop stop-color="#F7F3E8"/>
      <stop offset="0.52" stop-color="#E6F4F1"/>
      <stop offset="1" stop-color="#DCEBFF"/>
    </linearGradient>
    <linearGradient id="card" x1="280" y1="180" x2="1220" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFDF7"/>
