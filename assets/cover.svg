      <stop offset="1" stop-color="#B91C1C"/>
    </linearGradient>
    <filter id="shadow" x="214" y="118" width="1172" height="484" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feFlood flood-opacity="0" result="BackgroundImageFix"/>
