      <feBlend mode="normal" in="SourceGraphic" in2="effect1_dropShadow_1_2" result="shape"/>
    </filter>
  </defs>

  <rect width="1600" height="720" rx="32" fill="url(#bg)"/>
  <circle cx="190" cy="150" r="86" fill="#F59E0B" fill-opacity="0.12"/>
